<section class="offers-page">
  <div class="page-header">
    <div>
      <h1>Offers</h1>
      <p>Manage the offers available on the Cloudigo platform.</p>
    </div>
  </div>

  @if (isLoading) {
    <p>Loading offers...</p>
  } @else if (errorMessage) {
    <div>
      <p>{{ errorMessage }}</p>

      <button type="button" (click)="loadOffers()">
        Try again
      </button>
    </div>
  } @else if (offers.length === 0) {
    <p>No offers found.</p>
  } @else {
    <div class="offers-grid">
      @for (offer of offers; track offer._id) {
        <!-- Render the offer card component for each offer
        [offer] = the child component's @Input property that receives the offer data
        offer = the current offer object in the loop 

        Inputs: []
        Outputs: () -->
        
        <app-offer-card 
          [offer]="offer"
        />
      }
    </div>
  }
</section>
